<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Flora</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,700;1,700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #7209b7;
            --accent-font: 'Dancing Script', cursive;
            --title-font: 'Playfair Display', serif;
            --arabic-font: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(-45deg, #fff0f3, #ffe3ed, #f0e6ff, #e3f2fd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: var(--arabic-font);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 650px;
            z-index: 10;
        }
        h1 { 
            font-family: var(--title-font);
            color: var(--primary-color); 
            font-size: 3.5rem; 
            margin-bottom: 20px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        .gift-container {
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
        .gift-box { font-size: 130px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .btn-english { font-family: var(--accent-font); font-size: 1.5rem; color: var(--primary-color); margin-top: 10px; letter-spacing: 1px; }
        #countdown-box { background: rgba(255, 255, 255, 0.85); padding: 20px; border-radius: 20px; margin-top: 20px; font-size: 1.3rem; color: var(--secondary-color); box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: none; }
        #secret-message { display: none; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; margin-top: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: right; line-height: 2.2; font-size: 1.1rem; }
        #typing-container { color: #444; font-weight: 500; white-space: pre-line; }
        #wish-box { display: none; margin-top: 40px; animation: fadeIn 1.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #wish-input { width: 85%; padding: 15px 25px; border: 2px solid #ffccd5; border-radius: 50px; font-size: 1rem; text-align: center; outline: none; font-family: var(--arabic-font); margin-bottom: 20px; }
        .main-btn { font-family: var(--title-font); background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); color: white; border: none; padding: 12px 40px; border-radius: 50px; font-size: 1.4rem; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3); transition: 0.3s; }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 77, 109, 0.4); }
        .particle { position: fixed; pointer-events: none; z-index: 1; bottom: -50px; animation: floatUp var(--duration) linear forwards; }
        @keyframes floatUp { to { transform: translateY(-115vh) translateX(var(--wobble)); opacity: 0; } }
    </style>
</head>
<body>

    <audio id="birthday-song" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1 id="main-title">Happy Birthday, My One & Only</h1>

        <div id="surprise-zone" class="gift-container" onclick="startMagic()">
            <div class="gift-box">🎁</div>
            <div class="btn-english" id="gift-label">Open Your Gift</div>
        </div>

        <div id="countdown-box"></div>

        <div id="secret-message">
            <h2 style="color: var(--primary-color); text-align: center; font-family: var(--title-font); font-size: 2.2rem; margin-bottom: 30px;">To My Flora ✨</h2>
            <div id="typing-container"></div>
            
            <div id="wish-box">
                <p style="font-family: var(--accent-font); font-size: 1.8rem; color: var(--secondary-color); text-align: center; margin-bottom: 15px;">Make a Wish</p>
                <input type="text" id="wish-input" placeholder="اكتبي أمنيتك هنا..">
                <br>
                <button class="main-btn" onclick="sendWish()">Send My Wish ❤️</button>
            </div>
        </div>
    </div>

    <script>
        const unlockDate = new Date("July 19, 2026 00:00:00").getTime();
        const fullText = `النهاردة مش مجرد يوم عادي في السنة ولا مجرد رقم بيتغير.. النهاردة اليوم اللي وش الدنيا ضحك فيه عشان انتي نورتيها.. كل سنة وانتي اطيب واحن قلب عرفته في حياتي.. كل سنة وانتي الضحكة اللي بتطلع من القلب بجد والونس اللي مالي عليا دنيتي.\n\nعارفة.. انا ساعات بسرح وبقول لو مكنتيش موجودة كان زمان ايامي شكلها عامل ازاي.. وجودك جنبي هو اللي بيحلّي اي حاجة صعبة بعدي بيها.. انتي مش بس حبيبتي انتي السند اللي برمي عليه همي وبلاقي الدنيا هديت لمجرد اني اتكلمت معاكي.. وجودك في حياتي ده رزق كبير اوي وبشكر ربنا عليه كل يوم.\n\nوعايزك دايما تكوني مطمنة ومعندكيش ذرة خوف واحدة.. أنا بوعدك قدام ربنا وقدام نفسي إن عمري ما هسيبك ولا هبعد عنك مهما حصل.. هفضل دايما الظهر والراحة والأمان ليكي.. أي صعبة هنعديها سوا وأنا في ضهرك، ومستحيل تلاقيني بعيد عنك في يوم من الأيام لأن مكانك هنا جوه قلبي.\n\nكل سنة وانتي ناجحة ومحققة كل اللي بتتمنيه.. كل سنة وانتي فلورا اللي مفيش منها اتنين.. ربنا يخليكي ليا ويديمك في حياتي العمر كله يا اغلى من عندي 💖✨`;

        let textIndex = 0;
        let isLocked = false;

        function checkLockStatus() {
            const now = new Date().getTime();
            const timeLeft = unlockDate - now;
            if (timeLeft > 0) {
                isLocked = true;
                document.getElementById("countdown-box").style.display = "block";
                const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                document.getElementById("countdown-box").innerHTML = `🔒 الهدية مقفولة وهيتم فتحها يوم 19/7 إن شاء الله <br> متبقي: ${days} يوم و ${hours} ساعة و ${minutes} دقيقة و ${seconds} ثانية ✨`;
                document.getElementById("gift-label").innerText = "Locked 🔒";
            } else {
                isLocked = false;
                document.getElementById("countdown-box").style.display = "none";
                document.getElementById("gift-label").innerText = "Open Your Gift";
            }
        }

        setInterval(checkLockStatus, 1000);
        window.onload = checkLockStatus;

        function startMagic() {
            if (isLocked) { alert("الهدية لسه وقتها مجاش، استني ليوم 19/7 يا فلورا! 🔒🎈"); return; }
            document.getElementById("birthday-song").play().catch(e => console.log(e));
            document.getElementById("surprise-zone").style.display = "none";
            document.getElementById("secret-message").style.display = "block";
            for(let i=0; i<30; i++) { setTimeout(() => { createParticle('🎈'); createParticle('❤️'); }, i * 100); }
            setInterval(() => { createParticle('🎈'); createParticle('❤️'); }, 1500);
            typeText();
        }

        function typeText() {
            if (textIndex < fullText.length) {
                const container = document.getElementById("typing-container");
                if (fullText.charAt(textIndex) === '\n') { container.innerHTML += '<br>'; } else { container.innerHTML += fullText.charAt(textIndex); }
                textIndex++;
                setTimeout(typeText, 40);
            } else { document.getElementById("wish-box").style.display = "block"; }
        }

        function createParticle(symbol) {
            const particle = document.createElement('div');
            particle.innerHTML = symbol;
            particle.className = 'particle';
            const duration = Math.random() * 3 + 4;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.fontSize = Math.random() * 20 + 20 + 'px';
            particle.style.setProperty('--duration', duration + 's');
            particle.style.setProperty('--wobble', (Math.random() * 100 - 50) + 'px');
            document.body.appendChild(particle);
            setTimeout(() => { particle.remove(); }, duration * 1000);
        }

        function sendWish() {
            const wish = document.getElementById("wish-input").value;
            if (wish.trim() === "") return;
            const myInstagramUser = "tamer_wael743"; 
            navigator.clipboard.writeText(`فلورا كتبت أمنية عيد ميلادها: 🌟\n"${wish}"`).then(() => {
                alert("تم نسخ الأمنية تلقائياً! سيتم تحويلك الآن إلى شات إنستغرام لتبعثيها لـ تامر ❤️");
                window.open(`https://instagram.com/${myInstagramUser}`, '_blank');
            }).catch(() => { window.open(`https://instagram.com/${myInstagramUser}`, '_blank'); });
        }
    </script>
</body>
</html>
